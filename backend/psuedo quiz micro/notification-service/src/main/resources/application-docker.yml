# =============================================================================
# notification-service/src/main/resources/application-docker.yml
# PROFILE: docker
#
# ✅ SAFE TO COMMIT — all secrets are ${ENV_VAR} references.
# =============================================================================

server:
  port: 8085

spring:
  application:
    name: notification-service

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  thymeleaf:
    enabled: true
    cache: true

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://api-gateway:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.notification_service: INFO
    org.springframework.mail: INFO