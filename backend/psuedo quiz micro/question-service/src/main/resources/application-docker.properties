spring.application.name=question-service

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://postgres:${POSTGRES_PORT}/${QUESTION_DB_NAME}
spring.datasource.username=${QUESTION_DB_USER}
spring.datasource.password=${QUESTION_DB_PASSWORD}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=YourSecretKeyHereMustBeLongEnoughForHS512AlgorithmAtLeast64Characters123456
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ── OpenAI ────────────────────────────────────────────────────────────────────
openai.api.key=${OPENAI_API_KEY}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8083

# ── Eureka (service name = docker compose service name) ──────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Gateway discovery ────────────────────────────────────────────
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always