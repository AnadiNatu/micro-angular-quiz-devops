# =============================================================================
# api-gateway/src/main/resources/application-docker.yml
# PROFILE: docker  (set by docker-compose: SPRING_PROFILES_ACTIVE=docker)
#
# ✅ SAFE TO COMMIT — all secrets come from environment variables
#    injected by docker-compose.yml which reads from .env
# =============================================================================

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}           # injected from .env via docker-compose

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
            allowed-headers: "*"
            allow-credentials: false
      routes:
        - id: auth-service
          uri: http://auth-service:8082        # Docker service name
          predicates:
            - Path=/api/auth/**
        - id: question-service
          uri: http://question-service:8083    # Docker service name
          predicates:
            - Path=/api/questions/**
        - id: quiz-service
          uri: http://quiz-service:8084        # Docker service name
          predicates:
            - Path=/api/quiz/**
        - id: notification-service
          uri: http://notification-service:8085  # Docker service name
          predicates:
            - Path=/api/notify/**

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO