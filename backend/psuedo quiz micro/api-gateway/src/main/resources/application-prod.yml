server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
            allowed-headers: "*"
            allow-credentials: false
      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/auth/**
        - id: question-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/questions/**
        - id: quiz-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/quiz/**
        - id: quiz-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notify/**
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notify/**
        - id: quiz-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/leaderboard/**

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.cloud.gateway: WARN
    reactor.netty: WARN