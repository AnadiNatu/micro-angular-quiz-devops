# ==========================================================
# HTTP -> HTTPS Redirect
# ==========================================================

server {

    listen 80;
    listen [::]:80;

    server_name quiz-microservice.andiwebsolutions.com;

    return 301 https://$host$request_uri;
}

# ==========================================================
# HTTPS Server
# ==========================================================

server {

    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name quiz-microservice.andiwebsolutions.com;

    ssl_certificate     /etc/letsencrypt/live/quiz-microservice.andiwebsolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quiz-microservice.andiwebsolutions.com/privkey.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {

        expires 1y;

        add_header Cache-Control "public, immutable";

        try_files $uri =404;
    }

    location /api/ {

        proxy_pass http://api-gateway:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_hide_header Access-Control-Allow-Origin;

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Max-Age 3600 always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {

        try_files $uri $uri/ /index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin" always;
    }

    location /health {

        access_log off;

        return 200 "healthy\n";

        add_header Content-Type text/plain;
    }

    server_tokens off;
}