# =============================================================================
# frontend/nginx.conf
# Serves Angular SPA + proxies /api/* to the api-gateway container
# =============================================================================

server {
    listen 80;
    server_name _;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Root: Serve Angular SPA ───────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets: aggressive caching ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API Proxy → api-gateway container ────────────────────────────────────
    # All /api/* requests are forwarded to the api-gateway Docker service
    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Remove CORS headers from backend — nginx handles CORS
        proxy_hide_header Access-Control-Allow-Origin;

        # CORS headers (nginx adds these, not the backend)
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Max-Age       3600 always;

        # Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Angular HTML5 Routing ─────────────────────────────────────────────────
    # Any route not matching a file → return index.html (Angular handles routing)
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"           always;
        add_header X-Content-Type-Options "nosniff"              always;
        add_header X-XSS-Protection       "1; mode=block"        always;
        add_header Referrer-Policy        "strict-origin"        always;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Hide nginx version ────────────────────────────────────────────────────
    server_tokens off;
}
