<div class="glass-container">
  <div class="glass-login-card">
    <div class="card-header-section">
      <div class="logo-icon">🎓</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your Quiz Platform account</p>
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            id="username"
            class="form-control"
            [(ngModel)]="loginData.username"
            name="username"
            placeholder="Enter your username"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            class="form-control"
            [(ngModel)]="loginData.password"
            name="password"
            type="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert-glass alert-danger-glass mt-2">
        ⚠️ {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="glass-button w-100 mt-3"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        {{ isLoading ? 'Signing in...' : 'Login' }}
      </button>

    </form>

    <hr class="my-4">

<div class="demo-section">

  <h6 class="text-center fw-bold mb-3">
    Demo Accounts
  </h6>

  <div class="demo-toggle mb-3">

    <button
      type="button"
      class="btn"
      [class.btn-success]="selectedRole === 'ADMIN'"
      [class.btn-outline-success]="selectedRole !== 'ADMIN'"
      (click)="selectRole('ADMIN')">

      🛡 Admin

    </button>

    <button
      type="button"
      class="btn ms-2"
      [class.btn-primary]="selectedRole === 'PARTICIPANT'"
      [class.btn-outline-primary]="selectedRole !== 'PARTICIPANT'"
      (click)="selectRole('PARTICIPANT')">

      👤 Participants

    </button>

    <button
      type="button"
      class="btn"
      [class.btn-success]="selectedRole === 'CURATOR'"
      [class.btn-outline-success]="selectedRole !== 'CURATOR'"
      (click)="selectRole('CURATOR')">

      🛡 Curator

    </button>

  </div>

  <div
    *ngFor="let user of demoUsers[selectedRole]"
    class="demo-card mb-3">

   <div class="demo-card-body">

    <div class="demo-info">

        <h5>{{user.name}}</h5>

        <span class="role-chip">

            {{user.role}}

        </span>

        <div class="credential">

            <label>Username</label>

            <p>{{user.username}}</p>

        </div>

        <div class="credential">

            <label>Password</label>

            <p>{{user.password}}</p>

        </div>

    </div>

    <div class="demo-actions">

        <button
            class="btn-fill"
            (click)="fillCredentials(user)">

            Fill

        </button>

        <button
            class="btn-login-demo"
            (click)="quickLogin(user)">

            Login

        </button>

    </div>

</div>
  </div>
</div>

    <div class="divider">
      <span>or</span>
    </div>

    <div class="links-section text-center">
      <a routerLink="/forgot-password" class="glass-link-btn">
        🔑 Forgot Password?
      </a>
      <div class="mt-2">
        <span class="text-muted-light">Don't have an account?</span>
        <a routerLink="/signup" class="glass-link-btn ms-1">Sign Up</a>
      </div>
    </div>

  </div>
</div>
