<!-- src/app/admin/components/view-created-quiz/view-created-quiz.component.html -->

<div class="page-wrap">

  <div class="dashboard-header">
    <div class="header-greeting">
      <h1>📋 Quiz Details</h1>
      <p *ngIf="quiz">{{ quiz.title }}</p>
    </div>
    <button class="btn-close-sm" (click)="goBack()">← Back to Dashboard</button>
  </div>

  <div *ngIf="errorMessage" class="glass-card error-card">
    ⚠️ {{ errorMessage }}
  </div>

  <ng-container *ngIf="quiz">

    <div class="glass-card mt-2">
      <div class="card-title">
        <div class="title-icon">📝</div>
        {{ quiz.title }}
      </div>

      <div class="quiz-meta">
        <span class="badge-tag">{{ quiz.category }}</span>
        <span class="badge-difficulty" [ngClass]="'badge-' + (quiz.difficultyLevel | lowercase)">
          {{ quiz.difficultyLevel }}
        </span>
      </div>

      <!-- <p class="quiz-desc mt-2" *ngIf="quiz.description">{{ quiz.description }}</p> -->

      <button class="btn-primary mt-3" (click)="takeQuiz()">🎯 Take This Quiz</button>
    </div>

    <div class="glass-card mt-2">
      <div class="card-title">
        <div class="title-icon">❓</div>
        Questions ({{ questionTitles.length }})
      </div>

      <ol class="question-list" *ngIf="questionTitles.length; else noQuestions">
        <li *ngFor="let title of questionTitles">{{ title }}</li>
      </ol>

      <ng-template #noQuestions>
        <div class="empty-msg">No questions added to this quiz yet.</div>
      </ng-template>
    </div>

  </ng-container>

</div>
